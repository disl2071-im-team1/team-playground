<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galdrastafur</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #09090f;
  color: #d4c9a8;
  font-family: Georgia, 'Times New Roman', serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-bottom: 3rem;
}

/* ── Header ── */
header {
  text-align: center;
  padding: 2rem 1rem 1.25rem;
}
header h1 {
  font-size: 2.4rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: #c9a227;
  text-shadow: 0 0 24px rgba(201,162,39,0.45);
}
.subtitle {
  font-size: 0.8rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  opacity: 0.4;
  margin-top: 0.4rem;
}

/* ── Layout ── */
.game-wrap {
  width: 100%;
  max-width: 1040px;
  padding: 0 1rem;
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
}

/* ── Status bar ── */
.status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border: 1px solid #222233;
  border-radius: 4px;
  padding: 0.6rem 1.2rem;
  font-size: 0.85rem;
  background: rgba(255,255,255,0.02);
  letter-spacing: 0.05em;
}
.status-bar span { opacity: 0.7; }

/* ── Stave grid ── */
.stave {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0.75rem;
}

/* ── Area slot ── */
.area-slot {
  border: 2px solid #333;
  border-radius: 8px;
  padding: 0.9rem 1rem;
  min-height: 148px;
  display: flex;
  flex-direction: column;
  gap: 0.35rem;
  position: relative;
  transition: transform 0.15s, box-shadow 0.15s;
}
.area-slot.cracked {
  opacity: 0.28;
  filter: grayscale(0.7);
}
.cracked-label {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.85rem;
  letter-spacing: 0.25em;
  color: rgba(255,255,255,0.55);
  transform: rotate(-12deg);
  pointer-events: none;
}
.area-top {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}
.area-name {
  font-size: 1.25rem;
  font-weight: bold;
  letter-spacing: 0.08em;
}
.area-theme {
  font-size: 0.7rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  opacity: 0.5;
}
.area-nums {
  font-size: 0.9rem;
  opacity: 0.8;
}
.area-bar {
  height: 5px;
  background: rgba(255,255,255,0.08);
  border-radius: 3px;
  overflow: hidden;
}
.area-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.4s ease;
}
.area-rune-list {
  font-size: 0.72rem;
  opacity: 0.45;
  letter-spacing: 0.04em;
}
.area-channeled {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
  margin-top: 0.2rem;
}
.ch-glyph {
  font-size: 1.05rem;
  opacity: 0.7;
  cursor: default;
}

/* ── Flash animation ── */
@keyframes crack-flash {
  0%   { transform: scale(1); filter: brightness(1); }
  30%  { transform: scale(1.04); filter: brightness(1.6); }
  60%  { transform: scale(0.97); filter: brightness(0.8); }
  100% { transform: scale(1); filter: brightness(1); }
}
.area-slot.flash {
  animation: crack-flash 0.55s ease;
}

/* ── Message ── */
.message {
  text-align: center;
  font-style: italic;
  font-size: 0.9rem;
  opacity: 0.65;
  min-height: 1.4em;
  letter-spacing: 0.03em;
}

/* ── Hand section ── */
.hand-section {
  border: 1px solid #222233;
  border-radius: 8px;
  padding: 1rem;
  background: rgba(255,255,255,0.015);
}
.hand-label {
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  opacity: 0.4;
  margin-bottom: 0.75rem;
}
.hand-cards {
  display: flex;
  justify-content: center;
  align-items: flex-end;
  flex-wrap: nowrap;
  min-height: 180px;
  padding: 1.6rem 0.5rem 0.4rem;
}
.empty-hand {
  opacity: 0.3;
  font-style: italic;
  font-size: 0.85rem;
}

/* ── Card ── */
.card {
  width: 82px;
  height: 112px;
  border: 2px solid #2e2e42;
  border-radius: 7px;
  background: linear-gradient(155deg, #141424, #0e0e1c);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  position: relative;
  user-select: none;
  margin: 0 -16px;
  opacity: 0.88;
  transform: rotate(var(--card-rot, 0deg)) translateY(var(--card-ty, 0px));
  transform-origin: 50% 60%;
  transition: transform 0.2s ease, border-color 0.15s, box-shadow 0.2s, opacity 0.2s;
}
.card:first-child { margin-left: 0; }
.card:last-child  { margin-right: 0; }
.card:hover:not(.dead) {
  transform: translateY(-44px) scale(1.15) rotate(0deg);
  border-color: #c9a227;
  box-shadow: 0 14px 28px rgba(201,162,39,0.35);
  opacity: 1;
  z-index: 50;
}
.card.selected {
  transform: translateY(-56px) scale(1.08) rotate(0deg);
  opacity: 1;
  z-index: 40;
}
.card.dead {
  opacity: 0.35;
  cursor: default;
}
.card-val {
  position: absolute;
  top: 5px;
  right: 7px;
  font-size: 0.78rem;
  color: #c9a227;
  font-weight: bold;
}
.card-glyph {
  font-size: 2.1rem;
  line-height: 1;
  color: #c9a227;
  text-shadow: 0 0 12px rgba(201,162,39,0.35);
}
.card-name {
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-top: 0.25rem;
  opacity: 0.75;
}
.card-area {
  font-size: 0.58rem;
  margin-top: 0.1rem;
  opacity: 0.5;
}

/* ── Controls ── */
.controls {
  display: flex;
  gap: 0.65rem;
  flex-wrap: wrap;
}
button {
  padding: 0.55rem 1.2rem;
  border-radius: 4px;
  cursor: pointer;
  font-family: Georgia, serif;
  font-size: 0.85rem;
  letter-spacing: 0.05em;
  border: 1px solid;
  transition: background 0.12s, color 0.12s, border-color 0.12s;
}
button:disabled { opacity: 0.35; cursor: not-allowed; }

.btn-primary {
  background: transparent;
  border-color: #c9a227;
  color: #c9a227;
}
.btn-primary:hover:not(:disabled) { background: rgba(201,162,39,0.14); }

.btn-secondary {
  background: transparent;
  border-color: #3a3a55;
  color: #8a8aaa;
}
.btn-secondary:hover:not(:disabled) { border-color: #7a7aaa; color: #d4c9a8; }

.btn-danger {
  background: transparent;
  border-color: #8a2020;
  color: #c0391b;
}
.btn-danger:hover:not(:disabled) { background: rgba(192,57,27,0.14); }

/* ── Discard mode indicator ── */
.hand-cards.discard-mode .card:not(.selected) {
  border-color: #3a1a1a;
}
.hand-cards.discard-mode .card.selected {
  transform: translateY(-56px) scale(1.08) rotate(0deg);
  border-color: #c0391b;
  box-shadow: 0 12px 26px rgba(192,57,27,0.4);
}

/* ── Overlay ── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.88);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1.5rem;
  z-index: 100;
}
.overlay.hidden { display: none; }
.overlay-glyphs {
  font-size: 1.6rem;
  letter-spacing: 0.4em;
  color: rgba(201,162,39,0.3);
}
.overlay h2 {
  font-size: 2.4rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
}
.overlay.win h2  { color: #c9a227; text-shadow: 0 0 30px rgba(201,162,39,0.5); }
.overlay.lose h2 { color: #c0391b; text-shadow: 0 0 30px rgba(192,57,27,0.5); }
.overlay p {
  font-size: 1rem;
  opacity: 0.65;
  text-align: center;
  max-width: 380px;
  line-height: 1.6;
}

/* ── Rune legend (footer) ── */
.legend {
  margin-top: 0.5rem;
  border: 1px solid #1a1a2a;
  border-radius: 8px;
  padding: 0.9rem 1.1rem;
  background: rgba(255,255,255,0.01);
}
.legend-title {
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  opacity: 0.35;
  margin-bottom: 0.6rem;
}
.legend-grid {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 0.35rem 0.5rem;
}
.legend-entry {
  display: flex;
  flex-direction: column;
  align-items: center;
  font-size: 0.6rem;
  opacity: 0.5;
  gap: 1px;
}
.legend-entry .lg { font-size: 1rem; opacity: 0.8; }

/* ── Card info popup (revealed on hover) ── */
.card-info {
  position: absolute;
  bottom: calc(100% + 10px);
  left: 50%;
  transform: translateX(-50%);
  width: 188px;
  background: rgba(8,8,15,0.97);
  border: 1px solid #c9a227;
  border-radius: 6px;
  padding: 0.55rem 0.7rem;
  font-size: 0.62rem;
  letter-spacing: 0.04em;
  line-height: 1.55;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s ease 0.05s;
  z-index: 80;
  text-align: center;
  white-space: normal;
  text-transform: none;
  box-shadow: 0 8px 24px rgba(0,0,0,0.6);
}
.card:hover:not(.dead) .card-info { opacity: 1; }
.card-info .ci-meaning {
  color: #d4c9a8;
  margin-bottom: 0.35rem;
  font-style: italic;
}
.card-info .ci-flavour {
  color: #8a8aaa;
  font-size: 0.58rem;
  letter-spacing: 0.06em;
}
.card-info .ci-area {
  font-size: 0.6rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-top: 0.3rem;
}

/* ── HP & conditions in status bar ── */
.stat-hp {
  color: #d04040;
  letter-spacing: 0.08em;
  font-weight: bold;
  opacity: 1 !important;
}
.stat-hp.low {
  color: #ff4030;
  animation: hp-pulse 1.2s ease-in-out infinite;
}
@keyframes hp-pulse {
  0%, 100% { text-shadow: 0 0 6px rgba(208,64,64,0.4); }
  50%      { text-shadow: 0 0 14px rgba(255,80,80,0.95); }
}
.stat-conditions {
  color: #ffb347;
  font-weight: bold;
  opacity: 1 !important;
  text-shadow: 0 0 8px rgba(255,179,71,0.6);
  animation: cond-glow 2.2s ease-in-out infinite;
}
@keyframes cond-glow {
  0%, 100% { text-shadow: 0 0 8px rgba(255,179,71,0.6); color: #ffb347; }
  50%      { text-shadow: 0 0 14px rgba(255,107,61,0.95); color: #ff8030; }
}

/* ── Damage shake on HP ── */
@keyframes hp-shake {
  0%, 100% { transform: translateX(0); }
  15% { transform: translateX(-4px); }
  35% { transform: translateX(4px); }
  55% { transform: translateX(-3px); }
  75% { transform: translateX(3px); }
}
.hp-shake {
  animation: hp-shake 0.5s ease;
  color: #ff4030 !important;
  text-shadow: 0 0 14px rgba(255,64,48,0.95) !important;
}

/* ── Hand flash on condition applied ── */
@keyframes hand-flash {
  0%, 100% { box-shadow: none; transform: translateX(0); }
  15% { box-shadow: inset 0 0 30px rgba(255,140,40,0.4); transform: translateX(-4px); }
  40% { box-shadow: inset 0 0 40px rgba(255,107,61,0.45); transform: translateX(3px); }
  70% { box-shadow: inset 0 0 30px rgba(255,140,40,0.3); transform: translateX(-2px); }
}
.hand-flash { animation: hand-flash 0.55s ease; }

</style>
</head>
<body>

<header>
  <h1>Galdrastafur</h1>
  <p class="subtitle">Six wards seal the stave. Channel the runes. Break them.</p>
</header>

<div class="game-wrap">
  <div class="status-bar">
    <span id="stat-deck">Deck: 60</span>
    <span id="stat-hp" class="stat-hp">❤ 20 / 20</span>
    <span id="stat-conditions"></span>
    <span id="stat-turn">Turn 1</span>
    <span id="stat-cracked">0 / 6 wards broken</span>
  </div>

  <div class="stave" id="stave"></div>

  <div class="message" id="message"></div>

  <div class="hand-section">
    <div class="hand-label">Hand — <span id="hand-count">0</span> cards &nbsp;(max 8)</div>
    <div class="hand-cards" id="hand"></div>
  </div>

  <div class="controls" id="controls"></div>

  <div class="legend">
    <div class="legend-title">Rune reference</div>
    <div class="legend-grid" id="legend-grid"></div>
  </div>
</div>

<div class="overlay hidden" id="overlay">
  <div class="overlay-glyphs">ᚠ ᚢ ᚦ ᚬ ᚱ ᚴ ᚼ ᚾ ᛁ ᛅ ᛋ ᛏ ᛒ ᛘ ᛚ ᛦ</div>
  <h2 id="overlay-title"></h2>
  <p id="overlay-msg"></p>
  <button class="btn-primary" onclick="newGame()">Play Again</button>
</div>

<script>
// ===== DATA ==========================================================

const RUNE_DATA = [
  {rune:'ᚠ', name:'Fé',      meaning:'wealth, cattle, land', area:'Jörð',  value:4, copies:5},
  {rune:'ᚢ', name:'Úr',      meaning:'drizzle, slag',        area:'Vatn',  value:3, copies:3},
  {rune:'ᚦ', name:'Þurs',    meaning:'frost-giant',          area:'Ís',    value:5, copies:3},
  {rune:'ᚬ', name:'Óss',     meaning:'god, river-mouth',     area:'Vatn',  value:3, copies:3},
  {rune:'ᚱ', name:'Reið',    meaning:'riding, thunder',      area:'Eldur', value:3, copies:5},
  {rune:'ᚴ', name:'Kaun',    meaning:'torch, sore',          area:'Eldur', value:3, copies:5},
  {rune:'ᚼ', name:'Hagall',  meaning:'hail',                 area:'Ís',    value:3, copies:4},
  {rune:'ᚾ', name:'Nauð',    meaning:'need, distress',       area:'Dauði', value:3, copies:4},
  {rune:'ᛁ', name:'Íss',     meaning:'ice',                  area:'Ís',    value:2, copies:3},
  {rune:'ᛅ', name:'Ár',      meaning:'harvest, plenty',      area:'Líf',   value:3, copies:3},
  {rune:'ᛋ', name:'Sól',     meaning:'sun',                  area:'Líf',   value:4, copies:4},
  {rune:'ᛏ', name:'Týr',     meaning:'victory, sacrifice',   area:'Dauði', value:4, copies:3},
  {rune:'ᛒ', name:'Bjarkan', meaning:'birch, growth',        area:'Líf',   value:3, copies:3},
  {rune:'ᛘ', name:'Maðr',    meaning:'man, humankind',       area:'Jörð',  value:3, copies:5},
  {rune:'ᛚ', name:'Lögr',    meaning:'water, sea',           area:'Vatn',  value:4, copies:4},
  {rune:'ᛦ', name:'Ýr',      meaning:'yew, death-tree',      area:'Dauði', value:5, copies:3},
];

const STAVE_DATA = [
  {id:'Eldur', theme:'Fire',  resistance:8,  runeNames:['Reið','Kaun']},
  {id:'Ís',    theme:'Frost', resistance:9,  runeNames:['Þurs','Hagall','Íss']},
  {id:'Vatn',  theme:'Water', resistance:9,  runeNames:['Úr','Óss','Lögr']},
  {id:'Jörð',  theme:'Earth', resistance:8,  runeNames:['Fé','Maðr']},
  {id:'Líf',   theme:'Life',  resistance:9,  runeNames:['Ár','Sól','Bjarkan']},
  {id:'Dauði', theme:'Death', resistance:11, runeNames:['Nauð','Týr','Ýr']},
];

const THEME = {
  Eldur: {color:'#c0391b', border:'#c0391b', bg:'rgba(192,57,27,0.08)'},
  Ís:    {color:'#7fb3cc', border:'#7fb3cc', bg:'rgba(127,179,204,0.07)'},
  Vatn:  {color:'#1a8cb8', border:'#1a8cb8', bg:'rgba(26,140,184,0.08)'},
  Jörð:  {color:'#a07830', border:'#a07830', bg:'rgba(160,120,48,0.08)'},
  Líf:   {color:'#3a8f50', border:'#3a8f50', bg:'rgba(58,143,80,0.08)'},
  Dauði: {color:'#8a3fcf', border:'#8a3fcf', bg:'rgba(138,63,207,0.09)'},
};

// ===== ENGINE ========================================================

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildDeck() {
  let uid = 0;
  const cards = [];
  for (const r of RUNE_DATA) {
    for (let i = 0; i < r.copies; i++) cards.push({...r, uid: uid++});
  }
  return shuffle(cards);
}

function initAreas() {
  return STAVE_DATA.map(s => ({...s, channeled: 0, cracked: false, channeledCards: []}));
}

function drawN(deck, n) {
  const count = Math.min(n, deck.length);
  return {drawn: deck.slice(0, count), rest: deck.slice(count)};
}

function applyChannel(areas, cards) {
  const next = areas.map(a => ({...a, channeledCards: [...a.channeledCards]}));
  const cracked = [];
  const placedUids = new Set();
  for (const c of cards) {
    const a = next.find(x => x.id === c.area);
    if (!a || a.cracked) continue;
    a.channeled += c.value;
    a.channeledCards.push(c);
    placedUids.add(c.uid);
    if (a.channeled > a.resistance) {
      a.cracked = true;
      cracked.push(a.id);
    }
  }
  return {areas: next, cracked, placedUids};
}

function isWin(areas) { return areas.every(a => a.cracked); }

// ===== STATE =========================================================

const HAND_TARGET = 6;
const HAND_MAX = 8;

let G = {};

function newGame() {
  const deck = buildDeck();
  const {drawn, rest} = drawN(deck, HAND_TARGET);
  G = {
    deck: rest,
    hand: drawn,
    areas: initAreas(),
    sel: new Set(),
    discardMode: false,
    discardUsed: false,
    turn: 1,
    playerHp: 20,
    playerMaxHp: 20,
    conditions: [],
    weakenedTurn: false,
    exhaustedTurn: false,
    msg: 'The stave awakens. Channel runes to break its wards.',
    done: false,
    won: false,
  };
  render();
}

// ===== ACTIONS =======================================================

function selectCard(uid) {
  if (G.done) return;
  if (!G.discardMode) {
    const card = G.hand.find(c => c.uid === uid);
    if (!card) return;
    const area = G.areas.find(a => a.id === card.area);
    if (area && area.cracked) return;
  }
  G.sel.has(uid) ? G.sel.delete(uid) : G.sel.add(uid);
  render();
}

function channelSelected() {
  if (G.done || G.sel.size === 0) return;

  // Snapshot which wards were alive before this channel
  const preAreas = G.areas.map(a => ({...a}));

  const toChannel = G.hand.filter(c => G.sel.has(c.uid) &&
    preAreas.find(a => a.id === c.area && !a.cracked));

  if (toChannel.length === 0) {
    G.msg = 'No valid cards selected. Those wards are already broken.';
    render();
    return;
  }

  // Weakened condition: card values −1 (min 1) for this channel only
  let effectiveCards = toChannel;
  let weakenedUsed = false;
  if (G.weakenedTurn) {
    effectiveCards = toChannel.map(c => ({...c, value: Math.max(1, c.value - 1)}));
    weakenedUsed = true;
    G.weakenedTurn = false;
  }

  const {areas, cracked, placedUids} = applyChannel(G.areas, effectiveCards);
  G.areas = areas;
  G.hand = G.hand.filter(c => !placedUids.has(c.uid));
  G.sel.clear();

  // Unique attacked wards that were alive before the channel
  const attackedAreaIds = [];
  const seen = new Set();
  for (const c of toChannel) {
    if (seen.has(c.area)) continue;
    seen.add(c.area);
    const pre = preAreas.find(a => a.id === c.area);
    if (pre && !pre.cracked) attackedAreaIds.push(c.area);
  }

  // Fight-back: 55% per attacked ward. 40% damage / 60% condition.
  const fightBacks = [];
  let totalDamage = 0;
  const appliedConds = [];

  for (const areaId of attackedAreaIds) {
    if (Math.random() < 0.55) {
      if (Math.random() < 0.4) {
        const dmg = 2 + Math.floor(Math.random() * 4); // 2..5
        totalDamage += dmg;
        G.playerHp = Math.max(0, G.playerHp - dmg);
        fightBacks.push({areaId, kind: 'damage', amount: dmg});
      } else {
        const conds = ['Dazed', 'Cursed', 'Weakened', 'Exhausted'];
        const chosen = conds[Math.floor(Math.random() * conds.length)];
        G.conditions.push(chosen);
        appliedConds.push(chosen);
        fightBacks.push({areaId, kind: 'condition', name: chosen});
      }
    }
  }

  if (totalDamage > 0) {
    setTimeout(() => {
      const el = document.getElementById('stat-hp');
      if (el) { el.classList.add('hp-shake'); setTimeout(() => el.classList.remove('hp-shake'), 520); }
    }, 30);
  }
  if (appliedConds.length > 0) {
    setTimeout(() => {
      const el = document.querySelector('.hand-section');
      if (el) { el.classList.add('hand-flash'); setTimeout(() => el.classList.remove('hand-flash'), 560); }
    }, 30);
  }

  // Build message (can contain HTML — rendered via innerHTML)
  const parts = [];
  if (cracked.length > 0) {
    parts.push(cracked.length === 1
      ? `Ward broken: ${cracked[0]}!`
      : `Wards broken: ${cracked.join(', ')}!`);
    setTimeout(() => {
      for (const id of cracked) {
        const el = document.querySelector(`[data-area="${id}"]`);
        if (el) { el.classList.add('flash'); setTimeout(() => el.classList.remove('flash'), 600); }
      }
    }, 20);
  } else {
    parts.push(`Channeled ${toChannel.length} rune${toChannel.length > 1 ? 's' : ''}.`);
  }
  if (weakenedUsed) parts.push('<em>(Weakened: −1 each)</em>');
  for (const fb of fightBacks) {
    const t = THEME[fb.areaId];
    const color = t ? t.color : '#c0391b';
    if (fb.kind === 'damage') {
      parts.push(`The <span style="color:${color}">${fb.areaId}</span> ward strikes back — <strong style="color:#ff5040">${fb.amount} damage</strong>.`);
    } else {
      parts.push(`The <span style="color:${color}">${fb.areaId}</span> ward lashes out — you are <strong style="color:#ffb347">${fb.name}</strong>.`);
    }
  }
  G.msg = parts.join(' ');

  if (G.playerHp <= 0) {
    G.done = true; G.won = false;
    G.msg = parts.join(' ') + ' <em>You fall before the stave.</em>';
  } else if (isWin(G.areas)) {
    G.done = true; G.won = true;
  }
  render();
}

function startDiscard() {
  if (G.done || G.discardUsed) return;
  if (G.exhaustedTurn) {
    G.msg = 'You are too <strong style="color:#ffb347">Exhausted</strong> — no discard this turn.';
    render();
    return;
  }
  G.discardMode = true;
  G.sel.clear();
  G.msg = 'Select cards to discard, then confirm. You will draw back up to 5.';
  render();
}

function confirmDiscard() {
  if (!G.discardMode) return;
  const count = G.sel.size;
  G.hand = G.hand.filter(c => !G.sel.has(c.uid));
  G.sel.clear();
  G.discardMode = false;
  G.discardUsed = true;
  const need = Math.max(0, HAND_TARGET - G.hand.length);
  const {drawn, rest} = drawN(G.deck, need);
  G.hand = [...G.hand, ...drawn];
  G.deck = rest;
  G.msg = `Discarded ${count} card${count !== 1 ? 's' : ''}. Drew ${drawn.length}.`;
  render();
}

function cancelDiscard() {
  G.discardMode = false;
  G.sel.clear();
  G.msg = 'Discard cancelled.';
  render();
}

function endTurn() {
  if (G.done) return;
  if (G.hand.length > HAND_MAX) G.hand = G.hand.slice(0, HAND_MAX);
  G.turn++;
  G.discardUsed = false;
  G.discardMode = false;
  G.sel.clear();
  G.weakenedTurn = false;
  G.exhaustedTurn = false;

  // Apply pending conditions from previous turn's fight-backs
  const pending = G.conditions.slice();
  G.conditions = [];
  const condEvents = [];

  const cursedCount = pending.filter(c => c === 'Cursed').length;
  for (let i = 0; i < cursedCount && G.hand.length > 0; i++) {
    const idx = Math.floor(Math.random() * G.hand.length);
    const lost = G.hand.splice(idx, 1)[0];
    condEvents.push(`<strong style="color:#ffb347">Cursed</strong> — ${lost.name} slips from your grasp`);
  }

  let drawCount = Math.max(0, HAND_TARGET - G.hand.length);
  const dazedCount = pending.filter(c => c === 'Dazed').length;
  if (dazedCount > 0 && drawCount > 0) {
    drawCount = Math.max(1, drawCount - 2 * dazedCount);
    condEvents.push(`<strong style="color:#ffb347">Dazed${dazedCount > 1 ? ` x${dazedCount}` : ''}</strong> — fewer runes come`);
  }

  if (pending.includes('Weakened')) {
    G.weakenedTurn = true;
    condEvents.push('<strong style="color:#ffb347">Weakened</strong> — your runes channel for less');
  }
  if (pending.includes('Exhausted')) {
    G.exhaustedTurn = true;
    condEvents.push('<strong style="color:#ffb347">Exhausted</strong> — no discard this turn');
  }

  const {drawn, rest} = drawN(G.deck, drawCount);
  G.hand = [...G.hand, ...drawn];
  G.deck = rest;

  if (isWin(G.areas)) {
    G.done = true; G.won = true;
    G.msg = 'The stave is broken.';
  } else if (G.playerHp <= 0) {
    G.done = true; G.won = false;
    G.msg = 'You fall before the stave.';
  } else if (G.deck.length === 0) {
    G.done = true; G.won = false;
    G.msg = 'The deck runs dry. The stave holds.';
  } else {
    const tail = condEvents.length ? ` &nbsp;·&nbsp; ${condEvents.join(' &nbsp;·&nbsp; ')}` : '';
    G.msg = `Turn ${G.turn}. Drew ${drawn.length} card${drawn.length !== 1 ? 's' : ''}.${tail}`;
  }
  render();
}

// ===== RENDER ========================================================

function render() {
  renderStatus();
  renderStave();
  renderHand();
  renderControls();
  document.getElementById('message').innerHTML = G.msg;
  renderOverlay();
}

function renderStatus() {
  document.getElementById('stat-deck').textContent = `Deck: ${G.deck.length}`;

  const hpEl = document.getElementById('stat-hp');
  hpEl.textContent = `❤ ${G.playerHp} / ${G.playerMaxHp}`;
  hpEl.classList.toggle('low', G.playerHp > 0 && G.playerHp <= 6);

  const condEl = document.getElementById('stat-conditions');
  const queued = G.conditions.slice();
  const active = [];
  if (G.weakenedTurn)  active.push('Weakened');
  if (G.exhaustedTurn) active.push('Exhausted');

  const counts = {};
  for (const c of queued) counts[c] = (counts[c] || 0) + 1;
  const queuedLabels = Object.entries(counts).map(([k, v]) => v > 1 ? `${k}×${v}` : k);

  const parts = [];
  if (active.length)       parts.push(active.join(' + '));
  if (queuedLabels.length) parts.push('next: ' + queuedLabels.join(', '));

  if (parts.length) {
    condEl.textContent = `⚡ ${parts.join(' · ')}`;
    condEl.className = 'stat-conditions';
  } else {
    condEl.textContent = '';
    condEl.className = '';
  }

  document.getElementById('stat-turn').textContent = `Turn ${G.turn}`;
  const n = G.areas.filter(a => a.cracked).length;
  document.getElementById('stat-cracked').textContent = `${n} / 6 wards broken`;
}

function renderStave() {
  const el = document.getElementById('stave');
  el.innerHTML = G.areas.map(area => {
    const t = THEME[area.id];
    const pct = Math.min(100, Math.round((area.channeled / area.resistance) * 100));
    const runeList = RUNE_DATA.filter(r => area.runeNames.includes(r.name))
      .map(r => `${r.rune} ${r.name}`).join('  ·  ');
    const glyphs = area.channeledCards.map(c =>
      `<span class="ch-glyph" title="${c.name} +${c.value}" style="color:${t.color}">${c.rune}</span>`
    ).join('');

    return `<div class="area-slot${area.cracked ? ' cracked' : ''}"
                 data-area="${area.id}"
                 style="border-color:${t.border};background:${t.bg}">
      <div class="area-top">
        <span class="area-name" style="color:${t.color}">${area.id}</span>
        <span class="area-theme">${area.theme}</span>
      </div>
      <div class="area-nums">${area.channeled} / ${area.resistance}</div>
      <div class="area-bar"><div class="area-fill" style="width:${pct}%;background:${t.color}"></div></div>
      <div class="area-rune-list">${runeList}</div>
      ${glyphs ? `<div class="area-channeled">${glyphs}</div>` : ''}
      ${area.cracked ? '<div class="cracked-label">✦ cracked ✦</div>' : ''}
    </div>`;
  }).join('');
}

function renderHand() {
  const handEl = document.getElementById('hand');
  document.getElementById('hand-count').textContent = G.hand.length;

  if (G.hand.length === 0) {
    handEl.className = 'hand-cards';
    handEl.innerHTML = '<span class="empty-hand">No cards in hand.</span>';
    return;
  }

  const n = G.hand.length;
  const maxRot = n > 1 ? Math.min(12, 4 + (n - 1) * 1.6) : 0;

  handEl.className = 'hand-cards' + (G.discardMode ? ' discard-mode' : '');
  handEl.innerHTML = G.hand.map((c, i) => {
    const area = G.areas.find(a => a.id === c.area);
    const dead = !G.discardMode && area && area.cracked;
    const sel = G.sel.has(c.uid);
    const t = THEME[c.area];
    const stave = STAVE_DATA.find(s => s.id === c.area);
    const themeName = stave ? stave.theme : '';

    let rot = 0, ty = 0;
    if (n > 1) {
      const p = (i / (n - 1)) - 0.5; // -0.5..0.5
      rot = p * 2 * maxRot;
      ty  = Math.abs(p) * 18;
    }

    const styles = [`--card-rot:${rot.toFixed(2)}deg`, `--card-ty:${ty.toFixed(1)}px`];
    if (sel) {
      styles.push(`border-color:${t.color}`);
      styles.push(`box-shadow:0 10px 24px ${t.color}66`);
    }

    return `<div class="card${sel ? ' selected' : ''}${dead ? ' dead' : ''}"
                 style="${styles.join(';')}"
                 onclick="selectCard(${c.uid})">
      <div class="card-val">${c.value}</div>
      <div class="card-glyph">${c.rune}</div>
      <div class="card-name">${c.name}</div>
      <div class="card-area" style="color:${t.color}">${c.area}</div>
      <div class="card-info">
        <div class="ci-meaning">${c.meaning}</div>
        <div class="ci-flavour">Channels into ${c.area} · value +${c.value}</div>
        <div class="ci-area" style="color:${t.color}">${c.area} · ${themeName}</div>
      </div>
    </div>`;
  }).join('');
}

function renderControls() {
  const el = document.getElementById('controls');
  if (G.done) {
    el.innerHTML = `<button class="btn-primary" onclick="newGame()">New Game</button>`;
    return;
  }
  if (G.discardMode) {
    el.innerHTML = `
      <button class="btn-danger" onclick="confirmDiscard()">Confirm Discard (${G.sel.size} selected)</button>
      <button class="btn-secondary" onclick="cancelDiscard()">Cancel</button>`;
  } else {
    el.innerHTML = `
      <button class="btn-primary" onclick="channelSelected()" ${G.sel.size === 0 ? 'disabled' : ''}>
        Channel${G.sel.size > 0 ? ` (${G.sel.size} selected)` : ''}
      </button>
      <button class="btn-secondary" onclick="startDiscard()" ${G.discardUsed ? 'disabled' : ''}>
        ${G.discardUsed ? 'Discard used' : 'Discard & Redraw'}
      </button>
      <button class="btn-secondary" onclick="endTurn()">End Turn</button>`;
  }
}

function renderOverlay() {
  const el = document.getElementById('overlay');
  if (!G.done) { el.className = 'overlay hidden'; return; }
  el.className = 'overlay ' + (G.won ? 'win' : 'lose');
  document.getElementById('overlay-title').textContent =
    G.won ? 'The Stave is Broken' : 'The Stave Holds';
  document.getElementById('overlay-msg').textContent = G.won
    ? 'You channeled the runes and shattered all six wards. The Galdrastafur is undone.'
    : G.playerHp <= 0
      ? 'The wards lashed back until your last breath was spent. The stave endures beyond you.'
      : 'The cards run out. Not all wards were broken. The stave endures beyond you.';
}

// ===== LEGEND ========================================================

function buildLegend() {
  document.getElementById('legend-grid').innerHTML = RUNE_DATA.map(r => {
    const t = THEME[r.area];
    return `<div class="legend-entry" title="${r.meaning}">
      <span class="lg" style="color:${t.color}">${r.rune}</span>
      <span>${r.name}</span>
      <span>+${r.value}</span>
    </div>`;
  }).join('');
}

// ===== START =========================================================

buildLegend();
newGame();
</script>
