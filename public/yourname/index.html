<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Click Counter</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f1fa;
      color: #2c2c2a;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
    }
    h1 {
      font-size: 20px;
      font-weight: 500;
      color: #5f5e5a;
      margin: 0;
    }
    .count {
      font-size: 72px;
      font-weight: 600;
      color: #534ab7;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    button {
      background: #7b5cd6;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 16px 32px;
      font-size: 18px;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(123, 92, 214, 0.35);
      transition: transform 0.05s ease, background 0.2s ease, box-shadow 0.2s ease;
    }
    button:hover {
      background: #6a4cc4;
    }
    button:active {
      transform: scale(0.96);
      box-shadow: 0 2px 8px rgba(123, 92, 214, 0.35);
    }
  </style>
</head>
<body>
  <h1>Clicks</h1>
  <div class="count" id="count">0</div>
  <button id="btn">Click me!</button>

  <script>
    const countEl = document.getElementById('count');
    const btn = document.getElementById('btn');
    let count = 0;
    btn.addEventListener('click', () => {
      count += 1;
      countEl.textContent = count;
    });
  </script>
</body>
</html>
