<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catch the Button</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #2c2c2a;
      overflow: hidden;
      background: linear-gradient(135deg, #f4f1fa, #e7defb, #f0e6fb, #e2ecfb, #f4f1fa);
      background-size: 400% 400%;
      animation: drift 18s ease infinite;
    }
    @keyframes drift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @media (prefers-reduced-motion: reduce) {
      html, body { animation: none; }
    }
    .hud {
      position: fixed;
      top: 24px;
      left: 0;
      right: 0;
      text-align: center;
      pointer-events: none;
    }
    .hud h1 {
      font-size: 20px;
      font-weight: 500;
      color: #5f5e5a;
      margin: 0;
    }
    .score {
      font-size: 72px;
      font-weight: 600;
      color: #534ab7;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .best {
      font-size: 15px;
      color: #7b5cd6;
      font-weight: 500;
      margin-top: 10px;
      font-variant-numeric: tabular-nums;
    }
    .hint {
      font-size: 14px;
      color: #9a98a6;
      margin-top: 8px;
    }
    button {
      position: absolute;
      background: #7b5cd6;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 16px 32px;
      font-size: 18px;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(123, 92, 214, 0.35);
      transition: transform 0.05s ease, background 0.2s ease, box-shadow 0.2s ease,
                  top 0.12s ease, left 0.12s ease;
      white-space: nowrap;
    }
    button:hover { background: #6a4cc4; }
    button:active {
      transform: scale(0.96);
      box-shadow: 0 2px 8px rgba(123, 92, 214, 0.35);
    }
    .reset {
      position: fixed;
      top: auto;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: transparent;
      color: #7b5cd6;
      border: 1.5px solid #d8cdf2;
      box-shadow: none;
      padding: 10px 20px;
      font-size: 15px;
    }
    .reset:hover { background: #efeafc; }
    .reset:active {
      transform: translateX(-50%) scale(0.97);
      box-shadow: none;
    }
  </style>
</head>
<body>
  <div class="hud">
    <h1>Score</h1>
    <div class="score" id="score">0</div>
    <div class="best" id="best">Best: 0</div>
    <div class="hint">Catch the button. It moves every time you click it.</div>
  </div>

  <button id="btn">Catch me!</button>
  <button id="reset" class="reset">New round</button>

  <script>
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const btn = document.getElementById('btn');
    const resetBtn = document.getElementById('reset');
    const BEST_KEY = 'catch-the-button-best';

    let score = 0;
    let best = Number(localStorage.getItem(BEST_KEY)) || 0;
    bestEl.textContent = 'Best: ' + best;

    // Web Audio: short blips, no audio files needed. The context is created
    // lazily on first click because browsers block audio until a user gesture.
    let audioCtx = null;
    function playTone(freq, duration = 0.12) {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const now = audioCtx.currentTime;
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, now);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.2, now + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + duration);
      } catch (e) { /* audio unsupported, fail silently */ }
    }

    const margin = 12;
    const hudSafeZone = 180; // keep the button below the score readout

    function moveButton() {
      const maxLeft = window.innerWidth - btn.offsetWidth - margin;
      const maxTop = window.innerHeight - btn.offsetHeight - margin;
      const minTop = Math.min(hudSafeZone, maxTop);

      const left = margin + Math.random() * Math.max(0, maxLeft - margin);
      const top = minTop + Math.random() * Math.max(0, maxTop - minTop);

      btn.style.left = left + 'px';
      btn.style.top = top + 'px';
    }

    function centerButton() {
      btn.style.left = (window.innerWidth - btn.offsetWidth) / 2 + 'px';
      btn.style.top = (window.innerHeight - btn.offsetHeight) / 2 + 'px';
    }

    btn.addEventListener('click', () => {
      score += 1;
      scoreEl.textContent = score;
      // Pitch climbs with the score, so a streak sounds like a rising run.
      playTone(440 + Math.min(score, 24) * 30);
      if (score > best) {
        best = score;
        bestEl.textContent = 'Best: ' + best;
        localStorage.setItem(BEST_KEY, best);
      }
      moveButton();
    });

    resetBtn.addEventListener('click', () => {
      score = 0;
      scoreEl.textContent = score;
      playTone(220, 0.2); // low note to mark a fresh round
      centerButton();
    });

    window.addEventListener('resize', () => {
      const left = parseFloat(btn.style.left) || 0;
      const top = parseFloat(btn.style.top) || 0;
      const maxLeft = window.innerWidth - btn.offsetWidth - margin;
      const maxTop = window.innerHeight - btn.offsetHeight - margin;
      btn.style.left = Math.max(margin, Math.min(left, maxLeft)) + 'px';
      btn.style.top = Math.max(margin, Math.min(top, maxTop)) + 'px';
    });

    centerButton();
  </script>
</body>
</html>
