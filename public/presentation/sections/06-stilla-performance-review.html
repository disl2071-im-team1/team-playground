<!-- DIVIDER -->

  <div class="notes-src">Mike, 5 minutes. Audio plays and pulses highlight each person as their review is read. Click the slide to start the audio.</div>

<!-- PERFORMANCE REVIEWS: FULL IMAGE -->
<section class="slide perf-reviews" id="perf-slide">
  <img src="performance-review.png" alt="Performance review" class="pr-bg">
  <audio id="perf-audio" src="voice-over-feedback.m4a" preload="auto"></audio>

  <script>
    (function () {
      var audio = document.getElementById('perf-audio');
      var slide = document.getElementById('perf-slide');

      new MutationObserver(function () {
        if (slide.classList.contains('active')) {
          audio.currentTime = 0;
          audio.play().catch(function () {});
        } else {
          audio.pause();
          audio.currentTime = 0;
        }
      }).observe(slide, { attributes: true, attributeFilter: ['class'] });

      slide.addEventListener('click', function () {
        if (audio.paused) { audio.play(); } else { audio.pause(); }
      });
    })();
  </script>

  <div class="notes-src">Audio autoplays when slide becomes active, resets when leaving. Click to pause/resume.</div>
</section>
