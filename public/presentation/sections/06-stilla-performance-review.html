<!-- PERFORMANCE REVIEWS: FULL IMAGE -->
<section class="slide perf-reviews" id="perf-slide">
  <div class="label">Our performance review</div>
  <img src="performance-review.png" alt="Performance review" class="pr-bg">
  <audio id="perf-audio" src="voice-over-feedback.m4a" preload="auto"></audio>

  <script>
    (function () {
      var audio = document.getElementById('perf-audio');
      var slide = document.getElementById('perf-slide');

      window.deckOnRender = function () {
        if (slide.classList.contains('active')) {
          audio.currentTime = 0;
          audio.play().catch(function () {});
        } else {
          audio.pause();
          audio.currentTime = 0;
        }
      };

      slide.addEventListener('click', function () {
        if (audio.paused) { audio.play(); } else { audio.pause(); }
      });
    })();
  </script>

  <div class="notes-src">Audio autoplays when slide becomes active. Click to pause/resume.</div>
</section>
