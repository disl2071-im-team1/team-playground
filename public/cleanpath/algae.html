<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Algae Advisory Workbench · Clean Path</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230F6E56'/%3E%3Cpath d='M25 55 Q40 35 55 50 T80 45' stroke='white' stroke-width='6' fill='none' stroke-linecap='round'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <style>
    :root {
      --bg: #FAF8F1;
      --bg-primary: #FFFFFF;
      --bg-secondary: #F1EFE8;
      --text-primary: #2C2C2A;
      --text-secondary: #5F5E5A;
      --text-tertiary: #87857F;
      --border: rgba(0,0,0,0.08);
      --border-soft: rgba(0,0,0,0.05);
      --radius-sm: 4px;
      --radius-md: 6px;
      --radius-lg: 8px;
      --green: #1D9E75;
      --green-dark: #0F6E56;
      --green-soft: #E1F5EE;
      --red: #E24B4A;
      --red-soft: #FCEBEB;
      --amber: #EF9F27;
      --amber-soft: #FEF3E2;
      --amber-light: #FAC775;
      --purple: #534AB7;
      --purple-soft: #EEEDFB;
      --blue: #185FA5;
      --blue-soft: #E6F1FB;
      --gray: #9CA3AF;
      --gray-soft: #F3F4F6;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04), 0 1px 4px rgba(0,0,0,0.03);
      --shadow-md: 0 2px 8px rgba(0,0,0,0.08), 0 1px 2px rgba(0,0,0,0.04);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ---- App shell ---- */
    .app { display: flex; flex-direction: column; height: 100vh; }

    /* ---- Header ---- */
    .app-header {
      display: flex; align-items: center; gap: 16px;
      padding: 0 20px;
      height: 52px;
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; flex-shrink: 0; }
    .brand-mark {
      width: 28px; height: 28px; background: var(--green-dark);
      border-radius: 6px; display: flex; align-items: center; justify-content: center;
    }
    .brand-name { font-weight: 600; font-size: 13px; }
    .brand-sub { font-size: 10px; color: var(--text-tertiary); }
    .header-sep { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }
    .header-title { font-weight: 600; font-size: 13px; }
    .header-eyebrow { font-size: 10px; color: var(--text-tertiary); }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .live-badge { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-tertiary); }
    .live-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .header-back {
      font-size: 11px; color: var(--text-tertiary); text-decoration: none;
      padding: 4px 10px; border: 1px solid var(--border); border-radius: var(--radius-md);
    }
    .header-back:hover { color: var(--text-primary); }

    /* ---- Three-column body ---- */
    .body { display: flex; flex: 1; overflow: hidden; }

    /* ---- Map column ---- */
    .map-col {
      flex: 0 0 42%;
      position: relative;
      border-right: 1px solid var(--border);
    }
    #algae-map { width: 100%; height: 100%; }

    /* Map legend */
    .map-legend {
      position: absolute; bottom: 16px; right: 12px; z-index: 800;
      background: var(--bg-primary); border-radius: var(--radius-md);
      border: 1px solid var(--border); box-shadow: var(--shadow-sm);
      padding: 10px 12px; font-size: 11px;
    }
    .map-legend strong { display: block; margin-bottom: 6px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-tertiary); }
    .legend-row { display: flex; align-items: center; gap: 7px; margin-bottom: 4px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* Scope line on map (connecting related sites) */
    .leaflet-pane svg polyline { pointer-events: none; }

    /* ---- List column ---- */
    .list-col {
      flex: 0 0 220px;
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
      background: var(--bg-primary);
    }
    .list-head {
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--border-soft);
      flex-shrink: 0;
    }
    .list-head-title { font-size: 11px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 8px; }
    .filter-row { display: flex; gap: 4px; flex-wrap: wrap; }
    .filter-btn {
      font-size: 10px; padding: 2px 7px; border-radius: 20px;
      border: 1px solid var(--border); background: none; cursor: pointer;
      color: var(--text-secondary); transition: all 0.1s;
    }
    .filter-btn.active { background: var(--text-primary); color: white; border-color: var(--text-primary); }
    .site-list { flex: 1; overflow-y: auto; }
    .site-item {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 10px 14px; cursor: pointer;
      border-bottom: 1px solid var(--border-soft);
      transition: background 0.1s; position: relative;
    }
    .site-item:hover { background: var(--bg-secondary); }
    .site-item.selected {
      background: var(--green-soft);
      border-left: 3px solid var(--green-dark);
      padding-left: 11px;
    }
    .site-item-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
    .site-item-body { min-width: 0; flex: 1; }
    .site-item-name { font-size: 12px; font-weight: 500; line-height: 1.3; }
    .site-item-status { font-size: 10px; color: var(--text-tertiary); margin-top: 2px; }
    .stale-pip { width: 5px; height: 5px; border-radius: 50%; background: var(--amber); position: absolute; top: 10px; right: 10px; }

    /* ---- Detail column ---- */
    .detail-col {
      flex: 1;
      overflow-y: auto;
      background: var(--bg);
    }
    .detail-inner { padding: 20px 22px 48px; display: flex; flex-direction: column; gap: 16px; }

    /* Empty state */
    .empty-state {
      height: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--text-tertiary); text-align: center; gap: 8px; padding: 40px;
    }
    .empty-state-icon { font-size: 28px; }
    .empty-state-title { font-size: 14px; font-weight: 500; color: var(--text-secondary); }

    /* ---- Cards ---- */
    .card {
      background: var(--bg-primary); border-radius: var(--radius-lg);
      border: 1px solid var(--border); box-shadow: var(--shadow-sm); overflow: hidden;
    }
    .card-head {
      padding: 12px 16px 10px;
      border-bottom: 1px solid var(--border-soft);
      display: flex; align-items: center; gap: 8px;
    }
    .card-title { font-size: 12px; font-weight: 600; }
    .card-body { padding: 14px 16px; }

    /* Site header */
    .site-header-card { padding: 16px 18px; }
    .site-name { font-size: 18px; font-weight: 700; }
    .site-coords { font-size: 10px; color: var(--text-tertiary); margin-top: 2px; }
    .site-status-large {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 11px; border-radius: 20px; font-weight: 600; font-size: 11px;
      margin-top: 10px;
    }
    .confidence-row { display: flex; align-items: center; gap: 7px; margin-top: 8px; }
    .conf-bar { display: flex; gap: 2px; }
    .conf-block { width: 16px; height: 5px; border-radius: 2px; }
    .conf-h { background: var(--green); }
    .conf-m { background: var(--amber); }
    .conf-l { background: var(--red); }
    .conf-off { background: var(--border); }
    .stale-alert {
      display: flex; align-items: flex-start; gap: 7px;
      padding: 9px 12px; background: var(--amber-soft); border: 1px solid rgba(239,159,39,0.25);
      border-radius: var(--radius-md); font-size: 11px; color: #92600A; margin-top: 10px;
    }
    .scope-multi {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 12px; background: var(--red-soft); border-radius: var(--radius-md);
      font-size: 11px; font-weight: 500; color: var(--red); margin-top: 8px;
    }

    /* Risk box */
    .risk-text { font-size: 12px; line-height: 1.6; color: var(--text-secondary); }
    .rec-box {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px; margin-top: 12px;
      border-radius: var(--radius-md); font-weight: 500; font-size: 12px;
    }

    /* Evidence grid */
    .evidence-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .ev-card {
      padding: 10px 12px; border-radius: var(--radius-md);
      border: 1px solid var(--border); background: var(--bg);
    }
    .ev-card.stale { border-color: rgba(239,159,39,0.35); background: var(--amber-soft); }
    .ev-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
    .ev-label { font-size: 9px; font-weight: 700; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; }
    .prov { font-size: 8px; font-weight: 700; padding: 1px 5px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.05em; }
    .prov-observed { background: var(--green-soft); color: var(--green-dark); }
    .prov-modelled { background: var(--blue-soft); color: var(--blue); }
    .prov-forecast { background: var(--purple-soft); color: var(--purple); }
    .prov-unverified { background: var(--gray-soft); color: var(--text-secondary); }
    .ev-value { font-size: 12px; font-weight: 500; line-height: 1.4; }
    .ev-date { font-size: 10px; color: var(--text-tertiary); margin-top: 3px; }
    .ev-missing { font-size: 11px; color: var(--text-tertiary); font-style: italic; }

    /* Actions */
    .action-buttons { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 12px; }
    .btn {
      padding: 8px 16px; border-radius: var(--radius-md); font-size: 12px; font-weight: 500;
      border: none; cursor: pointer; transition: all 0.12s; font-family: inherit;
    }
    .btn-primary { background: var(--green-dark); color: white; }
    .btn-primary:hover { background: #0a5843; }
    .btn-danger { background: var(--red); color: white; }
    .btn-danger:hover { background: #c23a39; }
    .btn-secondary { background: none; color: var(--text-primary); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--bg-secondary); }
    .btn-warning { background: var(--amber); color: white; }
    .btn-warning:hover { background: #d08920; }
    .btn-ghost { background: var(--bg-secondary); color: var(--text-tertiary); cursor: default; }

    /* Audit */
    .audit-entry {
      padding: 9px 0; border-bottom: 1px solid var(--border-soft);
      display: grid; grid-template-columns: 8px 1fr; gap: 10px;
    }
    .audit-entry:last-child { border-bottom: none; }
    .audit-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; }
    .audit-action { font-size: 11px; font-weight: 600; }
    .audit-meta { font-size: 10px; color: var(--text-tertiary); margin-top: 1px; }
    .audit-evidence { font-size: 10px; color: var(--text-secondary); margin-top: 3px; font-style: italic; }
    .audit-rationale { font-size: 10px; color: var(--text-secondary); margin-top: 2px; }
    .audit-empty { font-size: 11px; color: var(--text-tertiary); font-style: italic; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.3);
      display: flex; align-items: center; justify-content: center;
      z-index: 2000; padding: 24px;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: var(--bg-primary); border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md); width: 100%; max-width: 500px; max-height: 80vh; overflow-y: auto;
    }
    .modal-head {
      padding: 16px 18px 12px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-title { font-size: 13px; font-weight: 600; }
    .modal-close { background: none; border: none; cursor: pointer; font-size: 18px; color: var(--text-tertiary); }
    .modal-body { padding: 16px 18px; }
    .modal-field { margin-bottom: 12px; }
    .modal-label { font-size: 10px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; display: block; }
    .modal-input, .modal-textarea {
      width: 100%; padding: 7px 9px; border: 1px solid var(--border);
      border-radius: var(--radius-md); font-size: 12px; font-family: inherit;
      background: var(--bg); color: var(--text-primary); outline: none;
    }
    .modal-input:focus, .modal-textarea:focus { border-color: var(--green-dark); }
    .modal-textarea { resize: vertical; min-height: 70px; }
    .modal-footer { display: flex; gap: 7px; justify-content: flex-end; padding: 12px 18px; border-top: 1px solid var(--border); }
    .generated-text {
      background: var(--bg-secondary); border-radius: var(--radius-md); padding: 11px 13px;
      font-size: 12px; line-height: 1.6; white-space: pre-wrap; border: 1px solid var(--border);
    }
    .copy-btn {
      font-size: 10px; padding: 3px 9px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: none; cursor: pointer; color: var(--text-secondary); margin-top: 7px;
    }
    .copy-btn:hover { background: var(--bg-secondary); }

    /* Status colour helpers */
    .bg-clear { background: var(--green-soft); color: var(--green-dark); }
    .bg-watch { background: #FEF3E2; color: #92600A; }
    .bg-advisory-recommended { background: var(--amber-soft); color: #7A4F00; }
    .bg-advisory-active { background: var(--red-soft); color: var(--red); }
    .bg-ready-to-lift { background: var(--purple-soft); color: var(--purple); }
    .bg-unknown { background: var(--gray-soft); color: var(--text-tertiary); }

    .dot-clear { background: var(--green); }
    .dot-watch { background: var(--amber-light); }
    .dot-advisory-recommended { background: var(--amber); }
    .dot-advisory-active { background: var(--red); }
    .dot-ready-to-lift { background: var(--purple); }
    .dot-unknown { background: var(--gray); }

    /* Leaflet popup override */
    .leaflet-popup-content-wrapper { border-radius: var(--radius-md); box-shadow: var(--shadow-md); border: 1px solid var(--border); }
    .leaflet-popup-content { font-family: 'Inter', ui-sans-serif, sans-serif; font-size: 12px; margin: 10px 13px; }
    .popup-name { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
    .popup-status { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; display: inline-block; margin-bottom: 6px; }
    .popup-open { font-size: 11px; color: var(--green-dark); cursor: pointer; font-weight: 600; text-decoration: underline; }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header class="app-header">
    <a href="index.html" class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
          <path d="M3 12 Q8 6 13 10 T21 8"/><path d="M3 17 Q8 13 13 16 T21 14"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">Clean Path</div>
        <div class="brand-sub">Stockholm · municipal monitor</div>
      </div>
    </a>
    <div class="header-sep"></div>
    <div>
      <div class="header-eyebrow">Bathing water</div>
      <div class="header-title">Algae Outbreak Advisory Workbench</div>
    </div>
    <div class="header-right">
      <div class="live-badge"><div class="live-dot"></div><span id="live-clock">--:--</span></div>
      <a href="index.html" class="header-back">← Overview</a>
    </div>
  </header>

  <!-- Body: map | list | detail -->
  <div class="body">

    <!-- Map -->
    <div class="map-col">
      <div id="algae-map"></div>
      <div class="map-legend" id="map-legend">
        <strong>Bloom status</strong>
        <div class="legend-row"><div class="legend-dot dot-clear"></div>Clear</div>
        <div class="legend-row"><div class="legend-dot dot-watch"></div>Watch</div>
        <div class="legend-row"><div class="legend-dot dot-advisory-recommended"></div>Advisory recommended</div>
        <div class="legend-row"><div class="legend-dot dot-advisory-active"></div>Advisory active</div>
        <div class="legend-row"><div class="legend-dot dot-ready-to-lift"></div>Ready to lift</div>
        <div class="legend-row"><div class="legend-dot dot-unknown"></div>Unknown</div>
      </div>
    </div>

    <!-- Site list -->
    <div class="list-col">
      <div class="list-head">
        <div class="list-head-title">Bathing sites</div>
        <div class="filter-row" id="filter-row">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="advisory_active">Advisory</button>
          <button class="filter-btn" data-filter="watch">Watch</button>
          <button class="filter-btn" data-filter="clear">Clear</button>
        </div>
      </div>
      <div class="site-list" id="site-list" role="list"></div>
    </div>

    <!-- Detail -->
    <div class="detail-col" id="detail-col">
      <div class="empty-state" id="empty-state">
        <div class="empty-state-icon">🌊</div>
        <div class="empty-state-title">Select a site</div>
        <div style="font-size:11px;color:var(--text-tertiary);max-width:200px;">
          Click a marker on the map or choose a site from the list.
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Action modal -->
<div class="modal-overlay hidden" id="action-modal">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-head">
      <div class="modal-title" id="modal-title-text"></div>
      <button class="modal-close" id="modal-close">×</button>
    </div>
    <div class="modal-body">
      <div class="modal-field">
        <label class="modal-label" for="modal-officer">Officer name</label>
        <input class="modal-input" id="modal-officer" type="text" placeholder="Your name" />
      </div>
      <div class="modal-field">
        <label class="modal-label" for="modal-rationale">Decision rationale</label>
        <textarea class="modal-textarea" id="modal-rationale" placeholder="Explain the basis for this decision…"></textarea>
      </div>
      <div class="modal-field" id="modal-swedish-field">
        <label class="modal-label">Public advisory text (Swedish)</label>
        <div class="generated-text" id="modal-swedish-text"></div>
        <button class="copy-btn" id="copy-swedish">Copy Swedish text</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
      <button class="btn btn-primary" id="modal-confirm">Confirm and record</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
(function () {
  'use strict';

  /* ============================================================
   * Data
   * ========================================================== */
  const NOW = new Date('2026-06-17T14:00:00');

  function fmt(d) {
    if (!d) return null;
    return d.toLocaleDateString('sv-SE', { day: 'numeric', month: 'short' }) + ' ' +
      d.toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit' });
  }
  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c =>
      ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  const SITES = [
    {
      id: 'langholmsbadet', name: 'Långholmsbadet',
      latlng: [59.318, 18.038], coords: '59.318°N 18.038°E',
      status: 'advisory_active', confidence: 'high',
      advisory_posted: hoursAgo(47), advisory_officer: 'A. Lindqvist', scope: 'multi',
      evidence: {
        sampling: { value: 'Cyanobacteria 82,000 cells/mL (threshold: 100,000)', date: hoursAgo(50), provenance: 'observed', stale: true },
        inspection: { value: 'Visible surface scum, green discolouration on northern shore', date: hoursAgo(27), provenance: 'observed' },
        citizen: { value: 'Three reports of green foam near the main bathing platform', date: hoursAgo(23), provenance: 'unverified' },
        modelled: { value: 'High bloom risk (index 8.2/10) — warm stable water, low mixing', date: hoursAgo(8), provenance: 'modelled' },
        forecast: { value: 'Risk persists 48 h. Low wind, water 21-23°C', date: hoursAgo(8), provenance: 'forecast' },
        water_temp: { value: '22.4°C (surface)', date: hoursAgo(26), provenance: 'observed' },
        wind: { value: 'SW 3 m/s — onshore, accumulation risk at northern beach', date: hoursAgo(6), provenance: 'modelled' }
      },
      risk_explanation: 'Sampling from 50 h ago shows cyanobacteria below the 100,000 cells/mL threshold, but visual inspection confirms persistent surface scum. Modelled risk is high and wind direction is onshore. No evidence of clearance. Sampling is stale and should be refreshed before any decision to lift.',
      recommendation: 'keep_advisory',
      audit: [
        { action: 'Advisory posted', officer: 'A. Lindqvist', date: hoursAgo(47), evidence: 'Sampling 82,000 cells/mL + visual scum confirmed', rationale: 'Precautionary action with bloom approaching threshold and clear visual signs.', color: 'var(--red)' }
      ]
    },
    {
      id: 'brunnsviken', name: 'Brunnsviken',
      latlng: [59.345, 18.042], coords: '59.345°N 18.042°E',
      status: 'watch', confidence: 'medium', scope: 'local',

  /* ============================================================
   * Metadata
   * ========================================================== */
  const STATUS = {
    clear:                { label: 'Clear',                   dot: '#1D9E75', bg: 'bg-clear',                  icon: '✓', dotCls: 'dot-clear' },
    watch:                { label: 'Watch',                   dot: '#FAC775', bg: 'bg-watch',                  icon: '◎', dotCls: 'dot-watch' },
    advisory_recommended: { label: 'Advisory recommended',   dot: '#EF9F27', bg: 'bg-advisory-recommended',   icon: '!', dotCls: 'dot-advisory-recommended' },
    advisory_active:      { label: 'Advisory active',        dot: '#E24B4A', bg: 'bg-advisory-active',        icon: '⚠', dotCls: 'dot-advisory-active' },
    ready_to_lift:        { label: 'Ready to lift',          dot: '#534AB7', bg: 'bg-ready-to-lift',          icon: '↑', dotCls: 'dot-ready-to-lift' },
    unknown:              { label: 'Unknown / no data',      dot: '#9CA3AF', bg: 'bg-unknown',                icon: '?', dotCls: 'dot-unknown' }
  };
  const REC = {
    no_action:           { label: 'No action required',         bg: 'bg-clear',                icon: '✓' },
    monitor:             { label: 'Continue monitoring',         bg: 'bg-watch',                icon: '◎' },
    request_sample:      { label: 'Request water sample',        bg: 'bg-watch',                icon: '🔬' },
    schedule_inspection: { label: 'Schedule field inspection',   bg: 'bg-advisory-recommended', icon: '🔎' },
    post_advisory:       { label: 'Post bathing advisory',       bg: 'bg-advisory-active',      icon: '⚠' },
    keep_advisory:       { label: 'Keep advisory active',        bg: 'bg-advisory-active',      icon: '⚠' },
    lift_advisory:       { label: 'Lift bathing advisory',       bg: 'bg-ready-to-lift',        icon: '↑' }
  };
  const PROV = {
    observed:   { label: 'Observed',         cls: 'prov-observed' },
    modelled:   { label: 'Modelled',         cls: 'prov-modelled' },
    forecast:   { label: 'Forecast',         cls: 'prov-forecast' },
    unverified: { label: 'Unverified report',cls: 'prov-unverified' }
  };
  const EV_LABELS = {
    sampling: 'Water sample', inspection: 'Field inspection', citizen: 'Citizen report',
    modelled: 'Modelled risk', forecast: 'Forecast risk', water_temp: 'Water temperature', wind: 'Wind'
  };

  /* ============================================================
   * State
   * ========================================================== */
  let selectedId = null;
  let currentFilter = 'all';
  let pendingAction = null;
  let auditLog = {};
  let mapMarkers = {};
  SITES.forEach(s => { auditLog[s.id] = [...(s.audit || [])]; });

  /* ============================================================
   * Map
   * ========================================================== */
  let map;
  function initMap() {
    map = L.map('algae-map', { zoomControl: true }).setView([59.318, 18.060], 12);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      maxZoom: 18, attribution: '© OpenStreetMap © CARTO'
    }).addTo(map);

    // Draw scope line between multi-site affected sites
    const multiSites = SITES.filter(s => s.scope === 'multi').map(s => s.latlng);
    if (multiSites.length >= 2) {
      L.polyline(multiSites, {
        color: '#E24B4A', weight: 1.5, opacity: 0.4, dashArray: '5, 6'
      }).addTo(map);
    }

    SITES.forEach(site => {
      const sm = STATUS[site.status];
      const marker = L.circleMarker(site.latlng, {
        radius: 9,
        fillColor: sm.dot,
        color: '#FFFFFF',
        weight: 2,
        fillOpacity: 0.9
      });

      marker.bindPopup(`
        <div class="popup-name">${esc(site.name)}</div>
        <div class="popup-status ${sm.bg}">${sm.icon} ${esc(sm.label)}</div>
        <div class="popup-open" data-open="${esc(site.id)}">Open detail →</div>
      `, { maxWidth: 220 });

      marker.on('click', () => {
        selectSite(site.id);
        marker.openPopup();
      });

      marker.addTo(map);
      mapMarkers[site.id] = marker;
    });

    // Popup link delegation
    map.on('popupopen', e => {
      const link = e.popup.getElement().querySelector('[data-open]');
      if (link) link.addEventListener('click', () => selectSite(link.dataset.open));
    });
  }

  function highlightMarker(siteId) {
    Object.entries(mapMarkers).forEach(([id, marker]) => {
      const sm = STATUS[SITES.find(s => s.id === id).status];
      if (id === siteId) {
        marker.setStyle({ radius: 12, weight: 3, color: '#2C2C2A' });
      } else {
        marker.setStyle({ radius: 9, weight: 2, color: '#FFFFFF' });
      }
    });
  }

  /* ============================================================
   * Staleness
   * ========================================================== */
  function staleness(item) {
    if (!item || !item.date) return null;
    const h = (NOW - item.date) / 3600000;
    return h > (item.provenance === 'observed' ? 48 : 24) ? Math.round(h) : null;
  }
  function hasStaleness(site) {
    return Object.values(site.evidence).some(e => e && staleness(e));
  }

  /* ============================================================
   * Confidence bars
   * ========================================================== */
  function confBars(level) {
    const n = { high: 3, medium: 2, low: 1 }[level] || 1;
    const cls = level === 'high' ? 'conf-h' : level === 'medium' ? 'conf-m' : 'conf-l';
    return [1,2,3].map(i => `<div class="conf-block ${i <= n ? cls : 'conf-off'}"></div>`).join('');
  }

  /* ============================================================
   * Swedish text
   * ========================================================== */
  function swedishText(site, action) {
    const titles = {
      post_advisory: `BADVATTENLYSNING utfärdas för ${site.name}.`,
      keep_advisory: `BADVATTENLYSNING kvarstår vid ${site.name}.`,
      lift_advisory: `BADVATTENLYSNING upphävs vid ${site.name}.`
    };
    const reasons = {
      post_advisory: 'Förhöjda halter av cyanobakterier (blågrönalger) har konstaterats i vattnet. Bad avrådes tills vidare.',
      keep_advisory: 'Provtagning och modellbedömning visar att algblomningen inte avklingat. Badvattenlysningen kvarstår.',
      lift_advisory: 'Kontrollprovtagning visar att halterna av cyanobakterier nu ligger under gränsvärdet. Vattenkvaliteten bedöms som godtagbar för bad.'
    };
    const advice = {
      post_advisory: 'Undvik bad, simning och vattensporter i området. Låt inte barn eller husdjur komma i kontakt med vattnet.',
      keep_advisory: 'Undvik fortfarande bad och kontakt med vattnet. Var uppmärksam på eventuell grönaktig missfärgning eller ytfilm.',
      lift_advisory: 'Badvattnet kan åter nyttjas. Kontakta miljökontoret om du observerar tecken på algblomning.'
    };
    const d = NOW.toLocaleDateString('sv-SE', { day: 'numeric', month: 'long', year: 'numeric' });
    const t = NOW.toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit' });
    return `${titles[action] || ''}\n\n${reasons[action] || ''}\n\n${advice[action] || ''}\n\nUtfärdad: ${d}, kl. ${t}\nStockholms stad, Miljöförvaltningen`;
  }

  /* ============================================================
   * Site list
   * ========================================================== */
  function renderList() {
    const el = document.getElementById('site-list');
    const visible = currentFilter === 'all'
      ? SITES
      : SITES.filter(s => s.status === currentFilter);
    el.innerHTML = visible.map(site => {
      const sm = STATUS[site.status];
      const stale = hasStaleness(site);
      return `<div class="site-item ${site.id === selectedId ? 'selected' : ''}" data-id="${esc(site.id)}" role="listitem" tabindex="0">
        <div class="site-item-dot ${sm.dotCls}"></div>
        <div class="site-item-body">
          <div class="site-item-name">${esc(site.name)}</div>
          <div class="site-item-status">${esc(sm.label)}</div>
        </div>
        ${stale ? '<div class="stale-pip" title="Stale data"></div>' : ''}
      </div>`;
    }).join('') || `<div style="padding:16px 14px;font-size:11px;color:var(--text-tertiary);">No sites match this filter.</div>`;
  }

  /* ============================================================
   * Evidence card
   * ========================================================== */
  function evCard(key, item) {
    const label = EV_LABELS[key] || key;
    if (!item) return `<div class="ev-card"><div class="ev-head"><span class="ev-label">${esc(label)}</span></div><div class="ev-missing">No data</div></div>`;
    const pm = PROV[item.provenance] || PROV.unverified;
    const staleH = staleness(item);
    return `<div class="ev-card ${staleH ? 'stale' : ''}">
      <div class="ev-head">
        <span class="ev-label">${esc(label)}</span>
        <span class="prov ${pm.cls}">${esc(pm.label)}</span>
      </div>
      <div class="ev-value">${esc(item.value)}</div>
      <div class="ev-date">${fmt(item.date)}${staleH ? ` <span style="color:var(--amber);font-weight:600;">(${staleH}h — stale)</span>` : ''}</div>
    </div>`;
  }

  /* ============================================================
   * Audit log
   * ========================================================== */
  function renderAudit(siteId) {
    const entries = auditLog[siteId] || [];
    if (!entries.length) return `<div class="audit-empty">No advisory decisions recorded yet.</div>`;
    return entries.slice().reverse().map(e =>
      `<div class="audit-entry">
        <div class="audit-dot" style="background:${e.color || 'var(--text-tertiary)'}"></div>
        <div>
          <div class="audit-action">${esc(e.action)}</div>
          <div class="audit-meta">${esc(e.officer)} · ${fmt(e.date)}</div>
          <div class="audit-evidence">Evidence: ${esc(e.evidence)}</div>
          <div class="audit-rationale">${esc(e.rationale)}</div>
        </div>
      </div>`
    ).join('');
  }

  /* ============================================================
   * Action buttons
   * ========================================================== */
  function actionBtns(site) {
    const active = site.status === 'advisory_active' || site.status === 'ready_to_lift';
    const canPost = !active && site.status !== 'clear';
    return `<div class="action-buttons">
      ${canPost ? `<button class="btn btn-danger" data-action="post_advisory">Post advisory</button>` : ''}
      ${active ? `<button class="btn btn-warning" data-action="keep_advisory">Keep advisory</button>` : ''}
      ${active ? `<button class="btn btn-primary" data-action="lift_advisory">Lift advisory</button>` : ''}
      ${site.status === 'clear' ? `<button class="btn btn-ghost" disabled>No action needed</button>` : ''}
    </div>`;
  }

  /* ============================================================
   * Detail panel
   * ========================================================== */
  function renderDetail(siteId) {
    const col = document.getElementById('detail-col');
    const site = SITES.find(s => s.id === siteId);
    if (!site) {
      col.innerHTML = `<div class="empty-state" id="empty-state">
        <div class="empty-state-icon">🌊</div>
        <div class="empty-state-title">Select a site</div>
        <div style="font-size:11px;color:var(--text-tertiary);max-width:200px;">Click a marker on the map or choose a site from the list.</div>
      </div>`;
      return;
    }
    const sm = STATUS[site.status];
    const rm = REC[site.recommendation];
    const staleList = Object.entries(site.evidence)
      .filter(([,v]) => v && staleness(v))
      .map(([k,v]) => `${EV_LABELS[k]} (${staleness(v)}h old)`);

    col.innerHTML = `<div class="detail-inner">
      <!-- Site header -->
      <div class="card site-header-card">
        <div class="site-name">${esc(site.name)}</div>
        <div class="site-coords">${esc(site.coords)}</div>
        <div class="site-status-large ${sm.bg}">
          <span style="font-size:14px;">${sm.icon}</span>${esc(sm.label)}
        </div>
        <div class="confidence-row">
          <span style="font-size:10px;color:var(--text-tertiary);">Confidence</span>
          <div class="conf-bar">${confBars(site.confidence)}</div>
          <span style="font-size:10px;font-weight:600;color:var(--text-secondary);">${esc(site.confidence)}</span>
        </div>
        ${site.advisory_posted ? `<div style="font-size:10px;color:var(--text-tertiary);margin-top:6px;">Advisory posted ${fmt(site.advisory_posted)} by ${esc(site.advisory_officer)}</div>` : ''}
        ${staleList.length ? `<div class="stale-alert"><span>⚠</span><div><strong>Stale data:</strong> ${esc(staleList.join('; '))}. Results may not reflect current conditions.</div></div>` : ''}
        ${site.scope === 'multi' ? `<div class="scope-multi"><span>⚠</span> Bloom spans multiple sites. Coordinate advisory with nearby Fredhällsbadet / Långholmsbadet.</div>` : ''}
      </div>

      <!-- Risk assessment -->
      <div class="card">
        <div class="card-head"><span class="card-title">Risk assessment</span></div>
        <div class="card-body">
          <div class="risk-text">${esc(site.risk_explanation)}</div>
          <div class="rec-box ${rm.bg}">${rm.icon} <strong>Recommended:</strong> ${esc(rm.label)}</div>
        </div>
      </div>

      <!-- Evidence -->
      <div class="card">
        <div class="card-head">
          <span class="card-title">Evidence</span>
          <span style="margin-left:auto;display:flex;gap:4px;">
            <span class="prov prov-observed">Observed</span>
            <span class="prov prov-modelled">Modelled</span>
            <span class="prov prov-forecast">Forecast</span>
            <span class="prov prov-unverified">Unverified</span>
          </span>
        </div>
        <div class="card-body">
          <div class="evidence-grid">
            ${Object.entries(site.evidence).map(([k,v]) => evCard(k,v)).join('')}
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="card">
        <div class="card-head"><span class="card-title">Advisory actions</span></div>
        <div class="card-body">
          <div style="font-size:11px;color:var(--text-secondary);margin-bottom:10px;">Each action creates a timestamped audit note.</div>
          ${actionBtns(site)}
        </div>
      </div>

      <!-- Audit -->
      <div class="card">
        <div class="card-head"><span class="card-title">Advisory history</span></div>
        <div class="card-body" id="audit-body">${renderAudit(site.id)}</div>
      </div>
    </div>`;

    col.querySelectorAll('[data-action]').forEach(btn =>
      btn.addEventListener('click', () => openModal(site.id, btn.dataset.action))
    );
    col.scrollTop = 0;
  }

  /* ============================================================
   * Select site
   * ========================================================== */
  function selectSite(siteId) {
    selectedId = siteId;
    renderList();
    renderDetail(siteId);
    highlightMarker(siteId);
    // Pan map to site
    const site = SITES.find(s => s.id === siteId);
    if (site && map) map.panTo(site.latlng, { animate: true, duration: 0.4 });
  }

  /* ============================================================
   * Modal
   * ========================================================== */
  function openModal(siteId, action) {
    const site = SITES.find(s => s.id === siteId);
    if (!site) return;
    pendingAction = { siteId, action };
    const labels = { post_advisory: `Post advisory — ${site.name}`, keep_advisory: `Keep advisory — ${site.name}`, lift_advisory: `Lift advisory — ${site.name}` };
    document.getElementById('modal-title-text').textContent = labels[action] || action;
    document.getElementById('modal-officer').value = '';
    document.getElementById('modal-rationale').value = '';
    document.getElementById('modal-swedish-text').textContent = swedishText(site, action);
    document.getElementById('action-modal').classList.remove('hidden');
  }
  function closeModal() {
    document.getElementById('action-modal').classList.add('hidden');
    pendingAction = null;
  }
  function confirmAction() {
    if (!pendingAction) return;
    const { siteId, action } = pendingAction;
    const site = SITES.find(s => s.id === siteId);
    const officer = document.getElementById('modal-officer').value.trim() || 'Unknown officer';
    const rationale = document.getElementById('modal-rationale').value.trim() || 'No rationale provided.';
    const evSummary = Object.entries(site.evidence).filter(([,v]) => v)
      .map(([k,v]) => `${EV_LABELS[k]}: ${v.value.substring(0,55)}`).join('; ');
    const colors = { post_advisory: 'var(--red)', keep_advisory: 'var(--amber)', lift_advisory: 'var(--green)' };
    const labels = { post_advisory: 'Advisory posted', keep_advisory: 'Advisory kept', lift_advisory: 'Advisory lifted' };
    auditLog[siteId].push({ action: labels[action] || action, officer, date: new Date(NOW), evidence: evSummary, rationale, color: colors[action] || 'var(--text-tertiary)' });
    if (action === 'post_advisory') site.status = 'advisory_active';
    else if (action === 'lift_advisory') site.status = 'clear';
    // Update marker colour
    const sm = STATUS[site.status];
    if (mapMarkers[siteId]) mapMarkers[siteId].setStyle({ fillColor: sm.dot });
    closeModal();
    renderList();
    renderDetail(siteId);
  }

  /* ============================================================
   * Boot
   * ========================================================== */
  function boot() {
    // Clock
    const clockEl = document.getElementById('live-clock');
    if (clockEl) clockEl.textContent = NOW.toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit' });

    initMap();
    renderList();

    // Site list clicks
    document.getElementById('site-list').addEventListener('click', e => {
      const item = e.target.closest('[data-id]');
      if (item) {
        selectSite(item.dataset.id);
        const site = SITES.find(s => s.id === item.dataset.id);
        if (site && mapMarkers[site.id]) mapMarkers[site.id].openPopup();
      }
    });
    document.getElementById('site-list').addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') {
        const item = e.target.closest('[data-id]');
        if (item) selectSite(item.dataset.id);
      }
    });

    // Filters
    document.getElementById('filter-row').addEventListener('click', e => {
      const btn = e.target.closest('[data-filter]');
      if (!btn) return;
      currentFilter = btn.dataset.filter;
      document.querySelectorAll('[data-filter]').forEach(b => b.classList.toggle('active', b.dataset.filter === currentFilter));
      renderList();
    });

    // Modal
    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('modal-cancel').addEventListener('click', closeModal);
    document.getElementById('modal-confirm').addEventListener('click', confirmAction);
    document.getElementById('action-modal').addEventListener('click', e => {
      if (e.target === document.getElementById('action-modal')) closeModal();
    });
    document.getElementById('copy-swedish').addEventListener('click', () => {
      navigator.clipboard.writeText(document.getElementById('modal-swedish-text').textContent).then(() => {
        const btn = document.getElementById('copy-swedish');
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Copy Swedish text'; }, 2000);
      });
    });
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();
})();
</script>
</body>
</html>
