<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Counter Game</title>
  <meta name="description" content="A tiny click-counter prototype in velvet red." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%237B1C2E'/%3E%3Ctext x='50' y='66' text-anchor='middle' font-family='Inter, sans-serif' font-size='52' font-weight='600' fill='white'%3E%2B1%3C/text%3E%3C/svg%3E" />
  <style>
    :root {
      --bg: #FAF8F1;
      --bg-primary: #FFFFFF;
      --bg-secondary: #F1EFE8;
      --text-primary: #2C2C2A;
      --text-secondary: #5F5E5A;
      --text-tertiary: #87857F;
      --border: rgba(0, 0, 0, 0.08);
      --border-tertiary: rgba(0, 0, 0, 0.06);
      --radius-sm: 4px;
      --radius-md: 6px;
      --radius-lg: 8px;
      --velvet: #7B1C2E;
      --velvet-dark: #501313;
      --velvet-darker: #350A0F;
      --velvet-soft: #F5E1E5;
      --shadow: 0 1px 2px rgba(0, 0, 0, 0.04), 0 1px 4px rgba(0, 0, 0, 0.03);
      --shadow-velvet: 0 4px 14px rgba(123, 28, 46, 0.25);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .app {
      max-width: 720px;
      margin: 0 auto;
      padding: 28px 24px 60px;
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
      padding-bottom: 18px;
      border-bottom: 0.5px solid var(--border-tertiary);
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-mark {
      width: 32px;
      height: 32px;
      background: var(--velvet);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.02em;
    }

    .brand-name {
      font-weight: 600;
      font-size: 15px;
      color: var(--text-primary);
    }

    .brand-sub {
      font-size: 11px;
      color: var(--text-tertiary);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 500;
      background: var(--velvet-soft);
      color: var(--velvet-dark);
    }

    .screen-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--velvet);
      font-weight: 600;
      margin-bottom: 4px;
    }

    h2 {
      font-size: 22px;
      font-weight: 500;
      line-height: 1.25;
      margin: 0;
      color: var(--text-primary);
      max-width: 520px;
    }

    .card {
      background: var(--bg-primary);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 32px;
    }

    .counter-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 28px;
      padding: 56px 32px;
      background: linear-gradient(180deg, #FFFFFF 0%, #FBF6F2 100%);
    }

    .count-label {
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      font-weight: 500;
    }

    .count {
      font-size: 96px;
      font-weight: 500;
      line-height: 1;
      color: var(--velvet);
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
      transition: transform 120ms ease-out;
    }

    .count.bump {
      transform: scale(1.06);
    }

    .click-btn {
      appearance: none;
      border: none;
      background: var(--velvet);
      color: #fff;
      font-family: inherit;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.01em;
      padding: 16px 36px;
      border-radius: var(--radius-md);
      cursor: pointer;
      box-shadow: var(--shadow-velvet);
      transition: background 120ms ease, transform 80ms ease, box-shadow 120ms ease;
    }

    .click-btn:hover {
      background: var(--velvet-dark);
    }

    .click-btn:active {
      background: var(--velvet-darker);
      transform: translateY(1px);
      box-shadow: 0 2px 6px rgba(123, 28, 46, 0.2);
    }

    .click-btn:focus-visible {
      outline: 2px solid var(--velvet);
      outline-offset: 3px;
    }

    .reset-row {
      display: flex;
      justify-content: center;
      margin-top: 4px;
    }

    .reset-btn {
      appearance: none;
      border: none;
      background: transparent;
      color: var(--text-tertiary);
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: var(--radius-sm);
    }

    .reset-btn:hover {
      color: var(--velvet);
      background: var(--velvet-soft);
    }

    .app-footer {
      margin-top: 28px;
      text-align: center;
      font-size: 11px;
      color: var(--text-tertiary);
    }
  </style>
</head>
<body>
  <main class="app">

    <header class="app-header">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">+1</div>
        <div>
          <div class="brand-name">Counter Game</div>
          <div class="brand-sub">prototype v0.1</div>
        </div>
      </div>
      <div class="pill">
        Velvet red
      </div>
    </header>

    <section class="screen">

      <div class="screen-head">
        <div>
          <div class="eyebrow">A very simple game</div>
          <h2>Click the button. Watch the number go up.</h2>
        </div>
      </div>

      <div class="card counter-card">
        <div class="count-label">Clicks</div>
        <div class="count" id="count" aria-live="polite">0</div>
        <button class="click-btn" id="click-btn" type="button">Click me!!</button>
        <div class="reset-row">
          <button class="reset-btn" id="reset-btn" type="button">Reset</button>
        </div>
      </div>

    </section>

    <footer class="app-footer">
      Counter Game · a tiny prototype.
    </footer>
  </main>

  <script>
    (function () {
      const countEl = document.getElementById('count');
      const clickBtn = document.getElementById('click-btn');
      const resetBtn = document.getElementById('reset-btn');
      let count = 0;

      function render() {
        countEl.textContent = String(count);
      }

      function bump() {
        countEl.classList.remove('bump');
        void countEl.offsetWidth;
        countEl.classList.add('bump');
      }

      clickBtn.addEventListener('click', function () {
        count += 1;
        render();
        bump();
      });

      resetBtn.addEventListener('click', function () {
        count = 0;
        render();
      });

      render();
    })();
  </script>
</body>
</html>
